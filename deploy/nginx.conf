############################################################
# HTTP -> HTTPS 重定向示例（有域名和证书时使用）
############################################################

server {
    listen 80;
    listen [::]:80;

    # TODO: 替换为你的真实域名，例如 erp.example.com
    server_name your-domain.com;

    # 所有 HTTP 请求 301 跳转到 HTTPS
    return 301 https://$host$request_uri;
}

############################################################
# HTTPS 主站点（443 端口）
############################################################

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # TODO: 替换为你的真实域名
    server_name your-domain.com;

    # TODO: 替换为实际证书路径（以 Let's Encrypt 为例）
    # 证书申请完成后，通常类似：
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_certificate     /etc/ssl/certs/your-domain.crt;
    ssl_certificate_key /etc/ssl/private/your-domain.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 前端静态文件目录（按你的部署路径调整）
    # 当前生产示例：/root/DL/frontend/dist
    root /root/DL/frontend/dist;
    index index.html;

    # 启用 Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # 所有 /api/ 请求反向代理到 Node 后端
    # 当前后端监听端口：5501
    location /api/ {
        proxy_pass http://127.0.0.1:5501/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端 SPA 路由 fallback：所有非静态路径兜底到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存示例
    location /assets {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

############################################################
# 仅 HTTP 部署（无域名 / 仅 IP 访问时，可使用下面这一段）
# 如需纯 HTTP，只保留这一段 server，把上面两个 server 注释掉即可。
############################################################

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /root/DL/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    location /api/ {
        proxy_pass http://127.0.0.1:5501/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
